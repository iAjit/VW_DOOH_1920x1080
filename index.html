  <script type="text/javascript" id="gwd-init-code">
    (function() {
      var gwdAd = document.getElementById('gwd-ad');

      /**
       * Handles the DOMContentLoaded event. The DOMContentLoaded event is
       * fired when the document has been completely loaded and parsed.
       */
      function handleDomContentLoaded(event) {

        const fallbackImage = document.getElementById('1920x1080_Backup');
        fallbackImage.style.opacity = 0;

        //DYNAMIC Calculations
        var userLatitude;
        var userLongitude;

        /*        function getQueryStringParams() {
                  console.log("Parsing parameters");
                  var params = {};
                  var queryString = window.location.search.substring(1);
                  var regex = /([^&=]+)=([^&]*)/g;
                  var match;

                  while (match = regex.exec(queryString)) {
                    params[decodeURIComponent(match[1])] = decodeURIComponent(match[2]);
                  }
                  console.log("Parsed parameters:", params);
                  return params;
                } */

        var qs = new URLSearchParams(window.location.search);
        var vioohAssetId = qs.get("viooh_asset_id");
        //vioohAssetId = 'ATV434290';
        //var infoElement = document.getElementById('info');
        //infoElement.innerHTML = '<p>Asset ID: ' + vioohAssetId + '</p>';        

        console.log("Sheet data : " + frameListData);
        if (frameListData) {
          var locationData = {};
          console.log("sheet data length: " + frameListData.length);
          for (var i = 0; i < frameListData.length; i++) {
            var row = frameListData[i];
            console.log("sheet data: " + frameListData[i]);
            locationData[row["ASSETUUID"]] = {
              lat: parseFloat(row["LATITUDE"]),
              lon: parseFloat(row["LONGITUDE"])
            };
          }
        }
        if (vioohAssetId && frameListData) {
          if (locationData[vioohAssetId]) {
            userLatitude = locationData[vioohAssetId].lat;
            userLongitude = locationData[vioohAssetId].lon;
            console.log(userLatitude);
            console.log(userLongitude);
          }
        }

        fetchLocation();

        function fetchLocation() {
          console.log("Fetch Location called");
          if (userLatitude && userLongitude) {
            var currentLat = userLatitude;
            var currentLon = userLongitude;
            var nearestStore = null;
            var minDistance = Infinity;
            var minTime = Infinity;

            for (var i = 0; i < locationListData.values.length; i++) {
              var store = locationListData.values[i];

              var storeName = store["Retailer"];
              var storeAdd = store["Street"] + ", " + store["Postcode"];
              var storeLat = parseFloat(store["Latitude"]);
              var storeLon = parseFloat(store["Longitude"]);

              var distance = getDistanceFromLatLonInKm(currentLat, currentLon, storeLat, storeLon);
              console.log("Distance Calculated: " + distance);

              if (distance < minDistance) {
                minDistance = distance;
                nearestStore = {
                  name: storeName,
                  add: storeAdd,
                  lat: storeLat,
                  lon: storeLon
                };
              }
            }

            console.log(nearestStore);

            if (nearestStore) {
              console.log('Nearest Store:', nearestStore.name);
              console.log('Distance:', minDistance.toFixed(2), 'km');
              //console.log('Walking Time: ', minTime.toFixed(2), ' minutes');
              const containerHeading = document.getElementById('nearstoreHeading');
              //  const containerStoreName = document.getElementById('nearstoreName');

              containerHeading.innerHTML = `<span style="font-family: VWHeadRegular;">Book your test drive at </span> <span style="font-family: VWHeadBold;">${nearestStore.name}.</span>`;

              /*   containerHeading.innerHTML = `Book your test drive at `;
                 containerStoreName.innerHTML = `${nearestStore.name}.`;
                 //containerStoreName.innerHTML = `Listers Stratford upon Avon.`;
                 containerStoreName.style.fontFamily = 'VWHeadBold';
                 containerHeading.style.fontFamily = 'VWHeadRegular'; */
            }
          } else {
            console.log('Nearest Store: No store found');
            const containerHeading = document.getElementById('nearstoreHeading');
            // const containerStoreName = document.getElementById('nearstoreName');

            containerHeading.innerHTML = ` `;
            //containerStoreName.innerHTML = ` `;
            fallbackImage.style.opacity = 1;

          }


          window.parent.postMessage({
            event: "viooh.ready"
          }, "*");

          console.log("viooh.ready Event Triggered");
        }

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
          var R = 6371;
          var dLat = deg2rad(lat2 - lat1);
          var dLon = deg2rad(lon2 - lon1);
          var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
          var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
          var d = R * c;
          return d;
        }

        function deg2rad(deg) {
          return deg * (Math.PI / 180);
        }

        function calculateWalkingTime(distanceInKm, walkingSpeed = 5) {
          // Default walking speed is 5 km/h, but you can adjust it as needed.
          var timeInHours = distanceInKm / walkingSpeed;
          var timeInMinutes = timeInHours * 60;
          return timeInMinutes;
        }

        function triggerPlay() {
          console.log('Play event triggered');
          console.log("Init ad called");
          gwdAd.initAd();

        }

        window.addEventListener('message', function(event) {
          if (event.data.event === 'viooh.play') {
            console.log("viooh.play Event");
            triggerPlay();
          }
        }, false);

      }

      /**
       * Handles the WebComponentsReady event. This event is fired when all
       * custom elements have been registered and upgraded.
       */
      function handleWebComponentsReady(event) {
        // Start the Ad lifecycle.
        requestAnimationFrame(function() {
          setTimeout(function() {
            // gwdAd.initAd();
          }, 1);
        });
      }

      /**
       * Handles the event that is dispatched after the Ad has been
       * initialized and before the default page of the Ad is shown.
       */
      function handleAdInitialized(event) {}

      window.addEventListener('DOMContentLoaded',
        handleDomContentLoaded, false);
      window.addEventListener('WebComponentsReady',
        handleWebComponentsReady, false);
      window.addEventListener('adinitialized',
        handleAdInitialized, false);
    })();
  </script>
